<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SR Psd</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--surf:#111113;--card:#18181b;
  --bord:rgba(255,255,255,0.08);
  --gold:#f5c542;--green:#22c55e;--blue:#60a5fa;--purple:#c084fc;--red:#f87171;
  --txt:#e4e4e7;--muted:#71717a;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column}
#hdr{flex-shrink:0;height:52px;padding:0 14px;display:flex;align-items:center;gap:10px;background:rgba(9,9,11,0.97);border-bottom:1px solid var(--bord);z-index:50}
#logo{font-size:20px;font-weight:900;letter-spacing:2px;color:var(--gold);white-space:nowrap;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
#logo:active{opacity:.7}
#hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
#badge{font-size:11px;color:var(--muted);background:var(--surf);border:1px solid var(--bord);padding:2px 8px;border-radius:20px;font-variant-numeric:tabular-nums}
#refresh-btn{width:34px;height:34px;flex-shrink:0;border-radius:9px;background:var(--surf);border:1.5px solid var(--bord);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:border-color .15s,color .15s}
#refresh-btn:active{opacity:.7}
#refresh-btn.spinning svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#refresh-btn:hover{border-color:var(--gold);color:var(--gold)}
#admin-btn{font-size:12px;font-weight:700;background:transparent;color:var(--gold);border:1.5px solid var(--gold);padding:5px 12px;border-radius:7px;cursor:pointer;font-family:inherit}
#admin-btn.on{background:var(--gold);color:#000}
#ctrl{flex-shrink:0;padding:10px 14px 6px;display:flex;flex-direction:column;gap:7px}
#search-row{display:flex;gap:8px;align-items:center}
#search{flex:1;background:var(--surf);border:1.5px solid var(--bord);border-radius:10px;padding:10px 14px;font-size:15px;color:var(--txt);outline:none;font-family:inherit}
#search:focus{border-color:var(--gold)}
#search::placeholder{color:var(--muted)}
#scan-btn{width:42px;height:42px;flex-shrink:0;border-radius:10px;background:var(--surf);border:1.5px solid var(--bord);color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center}
#scan-btn.on{border-color:var(--gold);color:var(--gold)}
.chip{white-space:nowrap;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;border:1.5px solid var(--bord);background:var(--surf);color:var(--muted);cursor:pointer;flex-shrink:0;font-family:inherit;-webkit-tap-highlight-color:transparent}
.chip.on{background:var(--gold);border-color:var(--gold);color:#000}
#stock-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
#stock-row::-webkit-scrollbar{display:none}
.stock-chip{white-space:nowrap;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;border:1.5px solid var(--bord);background:var(--surf);color:var(--muted);cursor:pointer;flex-shrink:0;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .15s}
.stock-chip[data-stock="all"].on{background:var(--gold);border-color:var(--gold);color:#000}
.stock-chip[data-stock="in"].on{background:rgba(34,197,94,0.18);border-color:var(--green);color:var(--green)}
.stock-chip[data-stock="low"].on{background:rgba(245,197,66,0.18);border-color:var(--gold);color:var(--gold)}
.stock-chip[data-stock="out"].on{background:rgba(248,113,113,0.18);border-color:var(--red);color:var(--red)}
#brand-modal-bg{position:fixed;inset:0;z-index:180;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
#brand-modal-bg.show{display:flex}
#brand-modal{background:var(--card);border:1px solid var(--bord);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:75vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
#brand-modal-bg.show #brand-modal{transform:translateY(0)}
#brand-modal-hdr{padding:16px 16px 10px;border-bottom:1px solid var(--bord);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#brand-modal-title{font-size:15px;font-weight:800;color:var(--txt)}
#brand-modal-close{background:var(--surf);border:1px solid var(--bord);color:var(--muted);width:28px;height:28px;border-radius:50%;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
#brand-search-wrap{padding:10px 16px 6px;flex-shrink:0}
#brand-search{width:100%;background:var(--surf);border:1.5px solid var(--bord);border-radius:8px;padding:8px 12px;font-size:14px;color:var(--txt);outline:none;font-family:inherit}
#brand-search:focus{border-color:var(--blue)}
#brand-search::placeholder{color:var(--muted)}
#brand-list{overflow-y:auto;padding:6px 10px 20px;flex:1}
.brand-item{display:flex;align-items:center;justify-content:space-between;padding:12px 10px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--txt);border-bottom:1px solid var(--bord);-webkit-tap-highlight-color:transparent;letter-spacing:.4px}
.brand-item:last-child{border-bottom:none}
.brand-item:active{background:var(--surf)}
.brand-item.selected{color:var(--blue);font-weight:700}
.brand-item .brand-count{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.brand-item.selected .brand-count{color:rgba(96,165,250,0.6)}
.brand-tick{color:var(--blue);font-size:14px;margin-left:8px;opacity:0}
.brand-item.selected .brand-tick{opacity:1}
#grp-btn{display:flex;align-items:center;gap:8px;background:var(--surf);border:1.5px solid var(--bord);border-radius:10px;padding:8px 14px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);width:100%;text-align:left;transition:border-color .15s}
#grp-btn:active{background:#222}
#grp-btn.active{border-color:var(--gold);color:var(--gold)}
#grp-btn .grp-arrow{margin-left:auto;font-size:11px;opacity:.5}
#grp-btn .grp-tag{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.3px}
#brand-btn{display:flex;align-items:center;gap:8px;background:var(--surf);border:1.5px solid var(--bord);border-radius:10px;padding:8px 14px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);width:100%;text-align:left;transition:border-color .15s}
#brand-btn:active{background:#222}
#brand-btn.active{border-color:var(--blue);color:var(--blue)}
#brand-btn .brand-arrow{margin-left:auto;font-size:11px;opacity:.5}
#brand-btn .brand-tag{background:var(--blue);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.3px}
#grp-modal-bg{position:fixed;inset:0;z-index:180;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
#grp-modal-bg.show{display:flex}
#grp-modal{background:var(--card);border:1px solid var(--bord);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:75vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
#grp-modal-bg.show #grp-modal{transform:translateY(0)}
#grp-modal-hdr{padding:16px 16px 10px;border-bottom:1px solid var(--bord);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#grp-modal-title{font-size:15px;font-weight:800;color:var(--txt)}
#grp-modal-close{background:var(--surf);border:1px solid var(--bord);color:var(--muted);width:28px;height:28px;border-radius:50%;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
#grp-search-wrap{padding:10px 16px 6px;flex-shrink:0}
#grp-search{width:100%;background:var(--surf);border:1.5px solid var(--bord);border-radius:8px;padding:8px 12px;font-size:14px;color:var(--txt);outline:none;font-family:inherit}
#grp-search:focus{border-color:var(--gold)}
#grp-search::placeholder{color:var(--muted)}
#grp-list{overflow-y:auto;padding:6px 10px 20px;flex:1}
.grp-item{display:flex;align-items:center;justify-content:space-between;padding:12px 10px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--txt);border-bottom:1px solid var(--bord);-webkit-tap-highlight-color:transparent}
.grp-item:last-child{border-bottom:none}
.grp-item:active{background:var(--surf)}
.grp-item.selected{color:var(--gold);font-weight:700}
.grp-item .grp-count{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.grp-item.selected .grp-count{color:rgba(245,197,66,0.6)}
.grp-tick{color:var(--gold);font-size:14px;margin-left:8px;opacity:0}
.grp-item.selected .grp-tick{opacity:1}
#sort-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
#sort-row::-webkit-scrollbar{display:none}
#pf{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
#pf label{font-size:11px;color:var(--muted);white-space:nowrap}
.pi{width:68px;background:var(--surf);border:1.5px solid var(--bord);border-radius:7px;padding:5px 8px;font-size:12px;color:var(--txt);outline:none;font-family:inherit;font-variant-numeric:tabular-nums}
.pi:focus{border-color:var(--gold)}
#pf-go{padding:5px 10px;border-radius:7px;background:var(--gold);border:none;color:#000;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
#pf-clr{padding:5px 9px;border-radius:7px;background:var(--surf);border:1px solid var(--bord);color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
#status{flex-shrink:0;padding:2px 14px 4px;font-size:11px;color:var(--muted)}
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch}
#scroll::-webkit-scrollbar{width:3px}
#scroll::-webkit-scrollbar-thumb{background:var(--bord);border-radius:3px}
#spacer{width:1px;pointer-events:none}
#stage{position:absolute;top:0;left:0;right:0}
.c{position:absolute;left:14px;right:14px;background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:16px;cursor:pointer}
.c.exp{border-color:rgba(245,197,66,0.3)}
.c-name{font-size:17px;font-weight:700;line-height:1.15;color:var(--txt)}
.c-alias{font-size:11px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
.prices{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pb{border-radius:8px;padding:7px 10px}
.pb.m{background:rgba(245,197,66,0.1);border:1px solid rgba(245,197,66,0.22)}
.pb.s{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.22);position:relative}
.pb.w{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.22);position:relative}
.pb.k{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.18)}
.pb.p{background:rgba(192,132,252,0.1);border:1px solid rgba(192,132,252,0.22)}
.pb.s.shareable, .pb.w.shareable{cursor:pointer;transition:transform .12s,box-shadow .12s}
.pb.s.shareable:active{transform:scale(0.96)}
.pb.w.shareable:active{transform:scale(0.96)}
.pb.s.shareable:hover{border-color:rgba(34,197,94,0.6);box-shadow:0 0 0 2px rgba(34,197,94,0.15)}
.pb.w.shareable:hover{border-color:rgba(96,165,250,0.6);box-shadow:0 0 0 2px rgba(96,165,250,0.15)}
.share-badge{position:absolute;top:5px;right:6px;font-size:9px;opacity:0.5;pointer-events:none}
.pl{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;opacity:.65}
.pb.m .pl{color:var(--gold)}.pb.s .pl{color:var(--green)}.pb.w .pl{color:var(--blue)}.pb.k .pl{color:var(--red)}.pb.p .pl{color:var(--purple)}
.pv{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.2;margin-top:1px}
.pb.m .pv{color:var(--gold)}.pb.s .pv{color:var(--green)}.pb.w .pv{color:var(--blue)}.pb.k .pv{color:var(--red)}.pb.p .pv{color:var(--purple)}
.det{display:none;border-top:1px solid var(--bord);margin-top:10px;padding-top:10px}
.c.exp .det{display:block}
.drow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.drow span:first-child{color:var(--muted)}
.drow span:last-child{font-weight:600;font-variant-numeric:tabular-nums;text-align:right;max-width:60%}
.act{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.ab{flex:1;min-width:60px;padding:7px 4px;border-radius:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.ab.cp{background:rgba(96,165,250,0.12);color:var(--blue);border:1px solid rgba(96,165,250,0.25)}
.ab.sh{background:rgba(34,197,94,0.10);color:var(--green);border:1px solid rgba(34,197,94,0.20)}
.ab.ed{background:rgba(245,197,66,0.12);color:var(--gold);border:1px solid rgba(245,197,66,0.25)}
.ab.wa{background:rgba(37,211,102,0.12);color:#25d366;border:1px solid rgba(37,211,102,0.3)}
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;gap:14px}
#welcome .w-logo{font-size:52px;font-weight:900;letter-spacing:5px;color:var(--gold);line-height:1}
#welcome .w-sub{font-size:18px;font-weight:800;letter-spacing:3px;color:var(--txt)}
#welcome .w-line{width:40px;height:2px;background:var(--gold);border-radius:2px;opacity:.5}
#welcome .w-hint{font-size:13px;color:var(--muted);line-height:1.7;max-width:220px}
#scan-ov{position:fixed;inset:0;z-index:200;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center}
#scan-ov.show{display:flex}
#scan-vid{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
#scan-ui{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
#scan-frame{width:260px;height:130px;border:2px solid var(--gold);border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,0.6);position:relative;overflow:hidden}
#scan-line{position:absolute;left:0;right:0;height:2px;background:var(--gold);box-shadow:0 0 6px var(--gold);animation:sl 1.8s ease-in-out infinite}
@keyframes sl{0%,100%{top:2px}50%{top:calc(100% - 4px)}}
#scan-hint{margin-top:22px;color:rgba(255,255,255,0.7);font-size:14px;text-align:center}
#scan-code{margin-top:8px;color:var(--gold);font-size:13px;min-height:18px;font-variant-numeric:tabular-nums}
#scan-close{margin-top:22px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:10px 26px;border-radius:30px;font-size:14px;cursor:pointer;font-family:inherit}
#adm-ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center}
#adm-ov.show{display:flex}
#adm-box{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:24px;width:88%;max-width:320px}
#adm-title{font-size:22px;font-weight:900;color:var(--gold);margin-bottom:4px}
#adm-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
#adm-pw{width:100%;background:var(--surf);border:1.5px solid var(--bord);border-radius:9px;padding:12px;font-size:20px;color:var(--txt);letter-spacing:8px;text-align:center;outline:none;font-family:inherit}
#adm-pw:focus{border-color:var(--gold)}
#adm-pw.err{border-color:var(--red);animation:sh .3s}
#adm-pw.ok{border-color:var(--green)}
@keyframes sh{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
#dots{display:flex;justify-content:center;gap:10px;margin-top:12px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--bord);border:1.5px solid var(--muted);transition:all .15s}
.dot.f{background:var(--gold);border-color:var(--gold)}
.dot.e{background:var(--red);border-color:var(--red)}
.dot.g{background:var(--green);border-color:var(--green)}
#adm-msg{font-size:12px;text-align:center;margin-top:8px;height:16px;color:var(--muted)}
#adm-msg.e{color:var(--red)}#adm-msg.g{color:var(--green)}
#adm-btns{display:flex;gap:8px;margin-top:16px}
#adm-cancel{flex:1;padding:10px;border-radius:9px;background:var(--surf);border:1px solid var(--bord);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit}
#adm-login{flex:2;padding:10px;border-radius:9px;background:var(--gold);border:none;color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
#edit-ov{position:fixed;inset:0;z-index:160;background:rgba(0,0,0,0.85);display:none;align-items:flex-end;justify-content:center}
#edit-ov.show{display:flex}
#edit-box{background:var(--card);border:1px solid var(--bord);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:78vh;overflow-y:auto}
#edit-title{font-size:18px;font-weight:800;color:var(--gold);margin-bottom:14px}
.ef-wrap{margin-bottom:10px}
.ef-lbl{font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.ef-in{width:100%;background:var(--surf);border:1.5px solid var(--bord);border-radius:7px;padding:9px 10px;font-size:13px;color:var(--txt);outline:none;font-family:inherit;font-variant-numeric:tabular-nums}
.ef-in:focus{border-color:var(--gold)}
#edit-btns{display:flex;gap:8px;margin-top:14px}
#edit-save{flex:2;padding:11px;border-radius:9px;background:var(--gold);border:none;color:#000;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
#edit-cancel{flex:1;padding:11px;border-radius:9px;background:var(--surf);border:1px solid var(--bord);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:#27272a;border:1px solid var(--bord);border-radius:30px;padding:9px 18px;font-size:13px;white-space:nowrap;z-index:300;transition:transform .25s,opacity .25s;opacity:0;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
mark{background:rgba(245,197,66,0.25);color:var(--gold);border-radius:2px;padding:0 1px}
.grp-hdr{position:absolute;left:14px;right:14px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);padding:4px 0 3px;border-bottom:1px solid rgba(245,197,66,0.2)}
#exp-ov{position:fixed;inset:0;z-index:170;background:rgba(0,0,0,0.92);display:none;align-items:flex-end;justify-content:center}
#exp-ov.show{display:flex}
#exp-box{background:var(--card);border:1px solid var(--bord);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:18px 18px 30px;display:flex;flex-direction:column;gap:12px}
#exp-title{font-size:15px;font-weight:800;color:#25d366;display:flex;align-items:center;gap:8px}
#exp-preview-wrap{border-radius:12px;overflow:hidden;border:1px solid var(--bord);background:#000;display:flex;justify-content:center}
#exp-canvas{max-width:100%;display:block}
#exp-btns{display:flex;gap:8px}
#exp-wa{flex:2;padding:12px;border-radius:10px;background:#25d366;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
#exp-save{flex:1;padding:12px;border-radius:10px;background:var(--surf);border:1px solid var(--bord);color:var(--txt);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
#exp-cancel{flex:1;padding:12px;border-radius:10px;background:var(--surf);border:1px solid var(--bord);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit}
#exp-price-hint{font-size:12px;color:var(--muted);text-align:center}
</style>
</head>
<body>

<div id="hdr">
  <div id="logo" onclick="goHome()">SR PSD</div>
  <div id="hdr-right">
    <div id="badge">—</div>
    <button id="refresh-btn" onclick="refreshData()" title="Refresh data">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <button id="admin-btn" onclick="openAdm()">⚡ Admin</button>
  </div>
</div>

<div id="ctrl">
  <div id="search-row">

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const PASS  = "7865";
const SHOP_NAME    = "SR FASHION";
const SHOP_ADDRESS = "GN Azad College Road, Vasant Nagar, Pusad – 445 204";
const SHOP_PHONE   = "7588756668";
const GAP   = 16;
let CARD_COLLAPSED_H = 160;
const BUFFER = 4;
const GRP_HDR_H = 26;
const LOW_STOCK_THRESHOLD = 5;

function measureCardHeight(){
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;top:-9999px;left:14px;right:14px;visibility:hidden;pointer-events:none;z-index:-1';
  probe.innerHTML = cardHTML({name:'Probe Item',alias:'PRB001',mrp:999,sale:799,wholesale:699,stock:10}, -1, 0, '');
  const inner = probe.firstElementChild;
  if(inner){ inner.style.position='relative'; inner.style.top='auto'; inner.style.left='auto'; inner.style.right='auto'; }
  document.body.appendChild(probe);
  const h = probe.firstElementChild ? probe.firstElementChild.offsetHeight : 160;
  document.body.removeChild(probe);
  CARD_COLLAPSED_H = h + 2;
}

function measureExpandedCard(ri){
  const el = stage.querySelector('.c[data-ri="' + ri + '"]');
  if(el) expandedHeights[ri] = el.offsetHeight + 4;
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let raw      = [];
let pool     = [];
let heights  = [];
let offsets  = [];
let isAdmin  = false;
let activeGroup = '';
let pMin     = null;
let pMax     = null;
let query    = '';
let editIdx  = -1;
let activeSort = 'df';
let activeStock = 'all';
let activeBrand = '';
let expanded = new Set();
let expandedHeights = {};
let vsStart  = 0;
let vsEnd    = 0;
let totalH   = 0;
let scrollEl, spacer, stage;

let expItem  = null;
let expPrice = 'sale';

/* ═══════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════ */
async function loadData(){
  try{
    const r = await fetch("items.json?t="+Date.now());
    if(!r.ok) throw new Error("HTTP "+r.status);
    raw = await r.json();
    document.getElementById("badge").textContent = raw.length.toLocaleString()+" items";
    buildGroupChips();
    buildBrandChips();
  }catch(e){}
  showWelcome();
}

async function refreshData(){
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  try{
    const r = await fetch("items.json?t="+Date.now());
    if(!r.ok) throw new Error("HTTP "+r.status);
    raw = await r.json();
    document.getElementById("badge").textContent = raw.length.toLocaleString()+" items";
    buildGroupChips();
    buildBrandChips();
    applyAll();
    toast("🔄 Refreshed — "+raw.length.toLocaleString()+" items");
  }catch(e){
    toast("❌ Refresh failed: "+e.message);
  }finally{
    setTimeout(()=>btn.classList.remove("spinning"), 600);
  }
}

function showWelcome(){
  spacer.style.height = '0px';
  stage.innerHTML = `
    <div id="welcome">
      <div class="w-logo">SR</div>
      <div class="w-sub">FASHION PUSAD</div>
      <div class="w-line"></div>
      <div class="w-hint">Search or scan a product above to find items instantly</div>
    </div>`;
  document.getElementById("status").textContent = '';
}

function goHome(){
  document.getElementById("search").value = '';
  query = ''; pMin = null; pMax = null; activeGroup = ''; activeStock = 'all'; activeBrand = '';
  document.getElementById("pmin").value = '';
  document.getElementById("pmax").value = '';
  activeSort='df';
  document.querySelectorAll("#sort-row .chip").forEach(c=>c.classList.remove("on"));
  const defChip=document.querySelector("#sort-row .chip[data-sort='df']");
  if(defChip)defChip.classList.add("on");
  document.querySelectorAll("#stock-row .stock-chip").forEach(c=>c.classList.remove("on"));
  document.querySelector("#stock-row .stock-chip[data-stock='all']").classList.add("on");
  document.getElementById('brand-btn-label').textContent = 'All Brands';
  document.getElementById('brand-btn').classList.remove('active');
  document.getElementById("grp-btn-label").textContent = "All Groups";
  document.getElementById("grp-btn").classList.remove("active");
  showWelcome();
}

/* ═══ STOCK FILTER ═══ */
document.getElementById("stock-row").addEventListener("click", function(e){
  const c = e.target.closest(".stock-chip[data-stock]");
  if(!c) return;
  document.querySelectorAll("#stock-row .stock-chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on");
  activeStock = c.dataset.stock;
  applyAll();
});

function stockMatches(it){
  if(activeStock === 'all') return true;
  const s = it.stock;
  if(s === null || s === undefined || s === '' || s === '–' || s === '-'){
    return activeStock === 'out';
  }
  const n = parseFloat(String(s));
  if(isNaN(n)) return activeStock === 'out';
  if(n <= 0)  return activeStock === 'out';
  if(n <= LOW_STOCK_THRESHOLD) return activeStock === 'low';
  return activeStock === 'in';
}

/* ═══ GROUP MODAL ═══ */
let allGroups = [];
function buildGroupChips(){
  const countMap = {};
  raw.forEach(it=>{ const g=it.group||''; countMap[g]=(countMap[g]||0)+1; });
  allGroups = Object.keys(countMap).filter(Boolean).sort();
}

let allBrands = [];
function buildBrandChips(){
  const brandSet = new Set();
  raw.forEach(it=>{
    const first = (it.name||'').trim().split(/\s+/)[0];
    if(/^[A-Z]{2,6}$/.test(first)) brandSet.add(first);
  });
  allBrands = [...brandSet].sort();
}

function openBrandModal(){
  renderBrandList('');
  document.getElementById('brand-modal-bg').classList.add('show');
  setTimeout(()=>document.getElementById('brand-search').focus(), 200);
}
function closeBrandModal(){
  document.getElementById('brand-modal-bg').classList.remove('show');
  document.getElementById('brand-search').value='';
}

function renderBrandList(filter){
  const f = filter.trim().toLowerCase();
  const countMap = {};
  raw.forEach(it=>{
    const first = (it.name||'').trim().split(/\s+/)[0];
    if(/^[A-Z]{2,6}$/.test(first)) countMap[first]=(countMap[first]||0)+1;
  });
  let brands = allBrands;
  if(f) brands = brands.filter(b=>b.toLowerCase().includes(f));
  let html = `<div class="brand-item${activeBrand===''?' selected':''}" onclick="selectBrand('')">
    <span>All Brands</span>
    <span style="display:flex;align-items:center;gap:6px">
      <span class="brand-count">${raw.length.toLocaleString()}</span>
      <span class="brand-tick">✓</span>
    </span>
  </div>`;
  if(!brands.length){
    html += `<div style="text-align:center;padding:30px;font-size:13px;color:var(--muted)">No brands found</div>`;
  } else {
    brands.forEach(b=>{
      const cnt = countMap[b]||0;
      const sel = activeBrand===b;
      html += `<div class="brand-item${sel?' selected':''}" onclick="selectBrand('${b}')">
        <span>${b}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="brand-count">${cnt.toLocaleString()}</span>
          <span class="brand-tick">✓</span>
        </span>
      </div>`;
    });
  }
  document.getElementById('brand-list').innerHTML = html;
}

function selectBrand(b){
  activeBrand = b;
  const btn = document.getElementById('brand-btn');
  const label = document.getElementById('brand-btn-label');
  if(b){
    label.innerHTML = `<span class="brand-tag">${b}</span>`;
    btn.classList.add('active');
  } else {
    label.textContent = 'All Brands';
    btn.classList.remove('active');
  }
  closeBrandModal();
  applyAll();
}

document.getElementById('brand-search').addEventListener('input', function(){
  renderBrandList(this.value);
});
document.getElementById('brand-modal-bg').addEventListener('click', function(e){
  if(e.target===this) closeBrandModal();
});

function openGrpModal(){
  renderGrpList('');
  document.getElementById("grp-modal-bg").classList.add("show");
  setTimeout(()=>document.getElementById("grp-search").focus(), 200);
}
function closeGrpModal(){
  document.getElementById("grp-modal-bg").classList.remove("show");
  document.getElementById("grp-search").value='';
}

function renderGrpList(filter){
  const f = filter.trim().toLowerCase();
  const countMap = {};
  raw.forEach(it=>{ const g=it.group||''; countMap[g]=(countMap[g]||0)+1; });
  let groups = allGroups;
  if(f) groups = groups.filter(g=>g.toLowerCase().includes(f));
  let html = `<div class="grp-item${activeGroup===''?' selected':''}" onclick="selectGroup('')">
    <span>All Groups</span>
    <span style="display:flex;align-items:center;gap:6px">
      <span class="grp-count">${raw.length.toLocaleString()}</span>
      <span class="grp-tick">✓</span>
    </span>
  </div>`;
  if(!groups.length){
    html += `<div style="text-align:center;padding:30px;font-size:13px;color:var(--muted)">No groups found</div>`;
  } else {
    groups.forEach(g=>{
      const cnt = countMap[g]||0;
      const sel = activeGroup===g;
      html += `<div class="grp-item${sel?' selected':''}" onclick="selectGroup('${g.replace(/'/g,"\\'")}')">
        <span>${g}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="grp-count">${cnt.toLocaleString()}</span>
          <span class="grp-tick">✓</span>
        </span>
      </div>`;
    });
  }
  document.getElementById("grp-list").innerHTML = html;
}

function selectGroup(g){
  activeGroup = g;
  const btn = document.getElementById("grp-btn");
  const label = document.getElementById("grp-btn-label");
  if(g){
    label.innerHTML = `<span class="grp-tag">${g}</span>`;
    btn.classList.add("active");
  } else {
    label.textContent = "All Groups";
    btn.classList.remove("active");
  }
  closeGrpModal();
  applyAll();
}

document.getElementById("grp-search").addEventListener("input", function(){
  renderGrpList(this.value);
});
document.getElementById("grp-modal-bg").addEventListener("click", function(e){
  if(e.target===this) closeGrpModal();
});

/* ═══ SORT ═══ */
document.getElementById("sort-row").addEventListener("click",function(e){
  const c=e.target.closest(".chip[data-sort]");
  if(!c) return;
  document.querySelectorAll("#sort-row .chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on");
  activeSort=c.dataset.sort;
  applyAll();
});

/* ═══ FILTER + SORT ═══ */
function pn(v){ return v==null||v===''?0:parseFloat(String(v).replace(/[^0-9.]/g,''))||0; }

function applyAll(){
  const q = query.trim().toLowerCase();
  const hasFilter = q || pMin!==null || pMax!==null || activeGroup || activeSort!=='df' || activeStock!=='all' || activeBrand!=='';
  if(!hasFilter){ showWelcome(); return; }
  expanded.clear();
  expandedHeights = {};
  let out = [];
  for(let i=0;i<raw.length;i++){
    const it = raw[i];
    if(activeGroup && it.group!==activeGroup) continue;
    if(pMin!==null && pn(it.sale)<pMin) continue;
    if(pMax!==null && pn(it.sale)>pMax) continue;
    if(!stockMatches(it)) continue;
    if(activeBrand){
      const first = (it.name||'').trim().split(/\s+/)[0];
      if(first !== activeBrand) continue;
    }
    if(q){
      const n=(it.name||'').toLowerCase();
      const a=(it.alias||'').toLowerCase();
      const b=(it.barcode||'').toLowerCase();
      const g=(it.group||'').toLowerCase();
      if(!n.includes(q)&&!a.includes(q)&&!b.includes(q)&&!g.includes(q)) continue;
    }
    out.push(i);
  }
  if(activeSort==='grp')  out.sort((a,b)=>((raw[a].group||'').localeCompare(raw[b].group||'')) || (raw[a].name||'').localeCompare(raw[b].name||''));
  else if(activeSort==='na') out.sort((a,b)=>(raw[a].name||'').localeCompare(raw[b].name||''));
  else if(activeSort==='sa') out.sort((a,b)=>pn(raw[a].sale)-pn(raw[b].sale));
  else if(activeSort==='sd') out.sort((a,b)=>pn(raw[b].sale)-pn(raw[a].sale));

  pool = out;
  measureCardHeight();
  rebuildOffsets();

  const sortLabel = activeSort==='grp'?' · sorted by group':activeSort==='na'?' · A–Z':activeSort==='sa'?' · price ↑':activeSort==='sd'?' · price ↓':'';
  const stockLabel = activeStock==='in'?' · in stock':activeStock==='low'?' · low stock':activeStock==='out'?' · out of stock':'';
  const brandLabel = activeBrand ? ' · '+activeBrand : '';
  document.getElementById("status").textContent =
    (pool.length===raw.length
      ? raw.length.toLocaleString()+" items"
      : pool.length.toLocaleString()+" of "+raw.length.toLocaleString()+" items")
    + sortLabel + stockLabel + brandLabel;

  scrollEl.scrollTop = 0;
  vsRender(true);
}

function rebuildOffsets(){
  heights  = new Array(pool.length).fill(CARD_COLLAPSED_H);
  offsets  = new Array(pool.length);
  let top  = 18;
  for(let i=0;i<pool.length;i++){
    if(activeSort==='grp'){
      const grp = raw[pool[i]].group||'';
      const prevGrp = i>0?(raw[pool[i-1]].group||''):'__NONE__';
      if(grp!==prevGrp) top += GRP_HDR_H;
    }
    offsets[i] = top;
    const ri = pool[i];
    const h = expanded.has(ri) ? (expandedHeights[ri] || CARD_COLLAPSED_H * 2) : CARD_COLLAPSED_H;
    top += h + GAP;
  }
  totalH = top + 60;
  spacer.style.height = totalH + 'px';
}

function vsRender(force){
  if(!pool.length){
    spacer.style.height='0px';
    stage.innerHTML='<div style="text-align:center;padding:50px 20px;font-size:14px;color:var(--muted)">No items found</div>';
    return;
  }
  const scrollTop = scrollEl.scrollTop;
  const viewH     = scrollEl.clientHeight;
  let first = bsearchFirst(scrollTop - BUFFER * CARD_COLLAPSED_H);
  let last  = bsearchLast(scrollTop + viewH + BUFFER * CARD_COLLAPSED_H);
  first = Math.max(0, first);
  last  = Math.min(pool.length-1, last);
  if(!force && first===vsStart && last===vsEnd) return;
  vsStart = first; vsEnd = last;
  const q = query.trim().toLowerCase();
  let html = '';
  for(let vi=first;vi<=last;vi++){
    if(activeSort==='grp'){
      const grp = raw[pool[vi]].group||'';
      const prevGrp = vi>0?(raw[pool[vi-1]].group||''):'__NONE__';
      if(grp!==prevGrp){
        const hdrTop = offsets[vi] - GRP_HDR_H;
        html += `<div class="grp-hdr" style="top:${hdrTop}px">${grp||'No Group'}</div>`;
      }
    }
    html += cardHTML(raw[pool[vi]], pool[vi], offsets[vi], q);
  }
  stage.innerHTML = html;
}

function bsearchFirst(targetTop){
  let lo=0, hi=offsets.length-1;
  while(lo<hi){
    const mid=(lo+hi)>>1;
    if(offsets[mid]<targetTop) lo=mid+1; else hi=mid;
  }
  return lo;
}
function bsearchLast(targetBottom){
  let lo=0, hi=offsets.length-1;
  while(lo<hi){
    const mid=(lo+hi+1)>>1;
    if(offsets[mid]<=targetBottom) lo=mid; else hi=mid-1;
  }
  return lo;
}

/* ═══ CARD HTML ═══ */
function fmt(v){
  if(v==null||v==='') return '–';
  const n=parseFloat(String(v).replace(/[^0-9.]/g,''));
  return isNaN(n)?String(v):'₹'+n.toLocaleString('en-IN');
}
function hl(t,q){
  if(!q||!t) return t||'';
  const i=t.toLowerCase().indexOf(q);
  if(i<0) return t;
  return t.slice(0,i)+'<mark>'+t.slice(i,i+q.length)+'</mark>'+t.slice(i+q.length);
}
function marginStr(it){
  const s=pn(it.sale),p=pn(it.purchase);
  if(!s||!p) return '';
  return ' <span style="font-size:10px;color:var(--green);font-weight:600">('+Math.round((s-p)/s*100)+'%)</span>';
}

function cardHTML(it, ri, topPx, q){
  const exp = expanded.has(ri);
  const purchBlock = isAdmin
    ?`<div class="pb p"><div class="pl">Purchase</div><div class="pv">${fmt(it.purchase)}${marginStr(it)}</div></div>`:'';
  const detHTML = exp?`
    <div class="det">
      <div class="drow"><span>Name</span><span>${it.name||'–'}</span></div>
      <div class="drow"><span>Alias</span><span>${it.alias||'–'}</span></div>
      ${it.barcode?`<div class="drow"><span>Barcode</span><span>${it.barcode}</span></div>`:''}
      ${it.group?`<div class="drow"><span>Group</span><span>${it.group}</span></div>`:''}
      ${it.brand?`<div class="drow"><span>Brand</span><span>${it.brand}</span></div>`:''}
      ${isAdmin&&it.purchase?`<div class="drow"><span>Purchase</span><span style="color:var(--purple)">${fmt(it.purchase)}</span></div>`:''}
      <div class="act">
        <button class="ab cp" onclick="copyItem(${ri},event)">📋 Copy</button>
        <button class="ab sh" onclick="shareItem(${ri},event)">📤 Share</button>
        ${isAdmin?`<button class="ab ed" onclick="openEdit(${ri},event)">✏️ Edit</button>`:''}
      </div>
    </div>`:'';

  return `<div class="c${exp?' exp':''}" style="top:${topPx}px" data-ri="${ri}" onclick="toggleCard(${ri})">
    <div class="c-name">${hl(it.alias||'',q)}</div>
    ${it.group?`<div class="c-alias">🗂 ${hl(it.group||'',q)}</div>`:''}
    <div class="prices">
      <div class="pb m"><div class="pl">MRP</div><div class="pv">${fmt(it.mrp)}</div></div>
      <div class="pb s shareable" onclick="openExp(${ri},'sale',event)" title="Tap to share Sale price image">
        <span class="share-badge">📤</span>
        <div class="pl">Sale Price</div>
        <div class="pv">${fmt(it.sale)}</div>
      </div>
      <div class="pb w shareable" onclick="openExp(${ri},'wholesale',event)" title="Tap to share Wholesale price image">
        <span class="share-badge">📤</span>
        <div class="pl">Wholesale</div>
        <div class="pv">${fmt(it.wholesale)}</div>
      </div>
      <div class="pb k"><div class="pl">Stock</div><div class="pv">${it.stock??'–'}</div></div>
      ${purchBlock}
    </div>
    ${detHTML}
  </div>`;
}

/* ═══ TOGGLE EXPAND ═══ */
function toggleCard(ri){
  const wasExpanded = expanded.has(ri);
  if(wasExpanded){
    expanded.delete(ri);
    delete expandedHeights[ri];
    rebuildOffsets();
    spacer.style.height = totalH + 'px';
    vsRender(true);
  } else {
    expanded.add(ri);
    if(!expandedHeights[ri]) expandedHeights[ri] = CARD_COLLAPSED_H * 3;
    rebuildOffsets();
    spacer.style.height = totalH + 'px';
    vsRender(true);
    measureExpandedCard(ri);
    rebuildOffsets();
    spacer.style.height = totalH + 'px';
    vsRender(true);
  }
  const vi = pool.indexOf(ri);
  if(vi>=0){
    const cardTop = offsets[vi];
    const scrollTop = scrollEl.scrollTop;
    if(cardTop < scrollTop) scrollEl.scrollTop = cardTop - 14;
  }
}

/* ── rounded rect path ── */
function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

/* ── discount emoji based on % ── */
function discountEmoji(pct){
  if(pct >= 40) return '🤩';
  if(pct >= 30) return '🔥';
  if(pct >= 20) return '😍';
  if(pct >= 10) return '😊';
  return '🎉';
}

/* ── draw the share card ── */
function drawExpCard(canvas){
  if(!expItem) return;
  const it  = expItem;
  const W   = 540;
  const PAD = 32;
  const INNER = W - PAD * 2;
  const FONT  = '-apple-system, BlinkMacSystemFont, Arial, sans-serif';

  /* helpers */
  const fmtNum = v => {
    if(v==null||v==='') return '–';
    const n = parseFloat(String(v).replace(/[^0-9.]/g,''));
    return isNaN(n) ? String(v) : '₹' + n.toLocaleString('en-IN');
  };

  /* set a tall canvas first */
  canvas.width  = W;
  canvas.height = 900;
  const ctx = canvas.getContext('2d');

  /* ── background ── */
  ctx.fillStyle = '#0d0d10';
  ctx.fillRect(0, 0, W, canvas.height);

  /* gold left bar */
  ctx.fillStyle = '#f5c542';
  ctx.fillRect(0, 0, 6, canvas.height);

  let y = 32;

  /* ══ SECTION 1 : ITEM DETAILS ══ */

  /* ── Name label + value ── */
  ctx.font = `bold 11px ${FONT}`;
  ctx.fillStyle = '#52525b';
  ctx.textBaseline = 'top';
  ctx.letterSpacing = '1px';
  ctx.fillText('NAME', PAD, y);
  y += 18;

  /* item name — large, white, wrapping */
  const nameTxt = it.name || '—';
  ctx.font = `bold 26px ${FONT}`;
  ctx.fillStyle = '#e4e4e7';
  /* measure & wrap */
  const nameWords = nameTxt.split(' ');
  let nameLine = '', nameLines = [];
  for(const w of nameWords){
    const test = nameLine ? nameLine + ' ' + w : w;
    if(ctx.measureText(test).width > INNER - 10 && nameLine){ nameLines.push(nameLine); nameLine = w; }
    else nameLine = test;
  }
  if(nameLine) nameLines.push(nameLine);
  nameLines = nameLines.slice(0, 2);
  nameLines.forEach(l => { ctx.fillText(l, PAD, y); y += 34; });
  y += 6;

  /* ── Alias (item code) ── */
  if(it.alias){
    ctx.font = `bold 11px ${FONT}`;
    ctx.fillStyle = '#52525b';
    ctx.fillText('CODE', PAD, y);
    y += 16;

    const aliasStr = it.alias;
    ctx.font = `bold 18px ${FONT}`;
    const aW = ctx.measureText(aliasStr).width;
    const pillX = PAD, pillY = y - 2, pillW = aW + 24, pillH = 26;
    roundRect(ctx, pillX, pillY, pillW, pillH, 6);
    ctx.fillStyle = 'rgba(245,197,66,0.13)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(245,197,66,0.4)';
    ctx.lineWidth = 1.2;
    roundRect(ctx, pillX, pillY, pillW, pillH, 6);
    ctx.stroke();
    ctx.fillStyle = '#f5c542';
    ctx.fillText(aliasStr, PAD + 12, y);
    y += 36;
  }

  /* ── Group ── */
  if(it.group){
    ctx.font = `bold 11px ${FONT}`;
    ctx.fillStyle = '#52525b';
    ctx.fillText('GROUP', PAD, y);
    y += 16;
    ctx.font = `600 15px ${FONT}`;
    ctx.fillStyle = '#a1a1aa';
    ctx.fillText(it.group, PAD, y);
    y += 24;
  }

  y += 10;

  /* ── Divider ── */
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
  y += 20;

  /* ══ SECTION 2 : PRICING ══ */

  const mrpVal  = pn(it.mrp);
  const priceVal = pn(it[expPrice]);
  const discount = mrpVal > 0 && priceVal > 0 ? mrpVal - priceVal : 0;
  const discPct  = mrpVal > 0 && discount > 0 ? (discount / mrpVal * 100) : 0;

  /* ── MRP row ── */
  ctx.font = `bold 11px ${FONT}`;
  ctx.fillStyle = '#52525b';
  ctx.fillText('MRP', PAD, y);
  y += 18;

  const mrpStr = fmtNum(it.mrp);
  ctx.font = `500 20px ${FONT}`;
  ctx.fillStyle = '#52525b';
  ctx.fillText(mrpStr, PAD, y);
  /* strikethrough */
  if(discount > 0){
    const sw = ctx.measureText(mrpStr).width;
    ctx.beginPath();
    ctx.strokeStyle = '#52525b';
    ctx.lineWidth = 1.5;
    ctx.moveTo(PAD, y + 10);
    ctx.lineTo(PAD + sw, y + 10);
    ctx.stroke();
  }
  y += 32;

  /* ── MAIN PRICE BOX ── */
  const priceLabel = expPrice === 'sale' ? 'SALE PRICE' : 'WHOLESALE PRICE';
  const priceStr   = fmtNum(it[expPrice]);
  const priceColor = expPrice === 'sale' ? '#22c55e' : '#60a5fa';
  const priceBg    = expPrice === 'sale' ? 'rgba(34,197,94,0.10)' : 'rgba(96,165,250,0.10)';
  const priceBord  = expPrice === 'sale' ? 'rgba(34,197,94,0.45)' : 'rgba(96,165,250,0.45)';

  /* auto-fit price font — never overflow box */
  let priceFontSize = 56;
  ctx.font = `bold ${priceFontSize}px ${FONT}`;
  while(priceFontSize > 22 && ctx.measureText(priceStr).width > INNER - 48){
    priceFontSize -= 2;
    ctx.font = `bold ${priceFontSize}px ${FONT}`;
  }

  const boxH = 22 + priceFontSize + 22;
  roundRect(ctx, PAD, y, INNER, boxH, 16);
  ctx.fillStyle = priceBg; ctx.fill();
  ctx.strokeStyle = priceBord; ctx.lineWidth = 1.5;
  roundRect(ctx, PAD, y, INNER, boxH, 16); ctx.stroke();

  ctx.font = `bold 11px ${FONT}`;
  ctx.fillStyle = priceColor;
  ctx.textBaseline = 'top';
  ctx.fillText(priceLabel, PAD + 20, y + 14);

  ctx.font = `bold ${priceFontSize}px ${FONT}`;
  ctx.fillStyle = priceColor;
  ctx.fillText(priceStr, PAD + 20, y + 22);

  y += boxH + 18;

  /* ── Discount row ── */
  if(discount > 0){
    const emoji = discountEmoji(discPct);
    const discStr = `You save  ${fmtNum(discount)}  (${discPct.toFixed(2)}%)  ${emoji}`;

    /* pill bg */
    ctx.font = `bold 15px ${FONT}`;
    const dW = ctx.measureText(discStr).width;
    const dPillW = Math.min(dW + 32, INNER);
    const dPillH = 32;
    roundRect(ctx, PAD, y, dPillW, dPillH, 8);
    ctx.fillStyle = 'rgba(34,197,94,0.08)'; ctx.fill();
    ctx.strokeStyle = 'rgba(34,197,94,0.25)'; ctx.lineWidth = 1;
    roundRect(ctx, PAD, y, dPillW, dPillH, 8); ctx.stroke();
    ctx.fillStyle = '#22c55e';
    ctx.fillText(discStr, PAD + 16, y + 8);
    y += dPillH + 18;
  }

  y += 8;

  /* ── Divider ── */
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W - PAD, y); ctx.stroke();
  y += 20;

  /* ══ SECTION 3 : SHOP DETAILS ══ */
  ctx.font = `bold 22px ${FONT}`;
  ctx.fillStyle = '#f5c542';
  ctx.textBaseline = 'top';
  ctx.fillText(SHOP_NAME, PAD, y);
  y += 30;

  ctx.font = `14px ${FONT}`;
  ctx.fillStyle = '#71717a';
  ctx.fillText(SHOP_ADDRESS, PAD, y);
  y += 22;

  ctx.font = `14px ${FONT}`;
  ctx.fillStyle = '#52525b';
  ctx.fillText('\u{1F4DE} ' + SHOP_PHONE, PAD, y);
  y += 24;

  /* ── Resize canvas to exact content ── */
  const finalH = y + 20;
  const imgData = ctx.getImageData(0, 0, W, Math.min(finalH, canvas.height));
  canvas.height = finalH;
  canvas.width  = W;
  ctx.fillStyle = '#0d0d10';
  ctx.fillRect(0, 0, W, finalH);
  ctx.fillStyle = '#f5c542';
  ctx.fillRect(0, 0, 6, finalH);
  ctx.putImageData(imgData, 0, 0);
}

async function getExpBlob(){
  const offscreen = document.getElementById('gen-canvas');
  drawExpCard(offscreen);
  await new Promise(r => setTimeout(r, 80));
  return new Promise(res => offscreen.toBlob(res, 'image/png', 0.95));
}

async function doExpWA(){
  if(!expItem) return;
  const it = expItem;
  const priceLabel = expPrice === 'sale' ? 'Sale' : 'Wholesale';
  const priceVal   = fmt(it[expPrice]);
  const mrpVal = pn(it.mrp), saleVal = pn(it[expPrice]);
  const disc = mrpVal > saleVal ? mrpVal - saleVal : 0;
  const discPct = mrpVal > 0 && disc > 0 ? (disc/mrpVal*100).toFixed(2) : 0;
  const emoji = disc > 0 ? discountEmoji(parseFloat(discPct)) : '';
  const discLine = disc > 0 ? `\nDiscount: ₹${disc.toLocaleString('en-IN')}  (${discPct}%)  ${emoji}` : '';

  const text = `*${SHOP_NAME}*\n${SHOP_ADDRESS}\n📞 ${SHOP_PHONE}\n\n*${it.name || ''}*\nCode: ${it.alias || '–'}${it.group ? '\nGroup: ' + it.group : ''}\n\nMRP: ${fmt(it.mrp)}\n💰 *${priceLabel}: ${priceVal}*${discLine}`;

  if(navigator.share && navigator.canShare){
    try{
      const blob = await getExpBlob();
      const file = new File([blob], (it.alias||'product')+'.png', {type:'image/png'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({ files:[file], title: it.name, text });
        closeExp(); return;
      }
    }catch(err){
      if(err.name==='AbortError'){ closeExp(); return; }
    }
  }
  const waUrl = 'https://wa.me/?text=' + encodeURIComponent(text);
  window.open(waUrl, '_blank');
  toast("📲 Opened WhatsApp");
  closeExp();
}

async function doExpSave(){
  try{
    const blob = await getExpBlob();
    if(navigator.clipboard && window.ClipboardItem){
      await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
      toast("📋 Image copied to clipboard!");
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (expItem?.alias || 'product') + '_' + expPrice + '.png';
      a.click();
      URL.revokeObjectURL(url);
      toast("💾 Image saved!");
    }
  }catch(e){
    toast("❌ Save failed: " + e.message);
  }
}

/* ═══ SCANNER ═══ */
let scanStream=null, scanLoop=null, codeReader=null, zxingReady=false;

async function openScanner(){
  document.getElementById("scan-ov").classList.add("show");
  document.getElementById("scan-btn").classList.add("on");
  document.getElementById("scan-code").textContent='';
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
    scanStream=stream;
    const vid=document.getElementById("scan-vid");
    vid.srcObject=stream; await vid.play();
    if('BarcodeDetector' in window){
      const bd=new BarcodeDetector({formats:['qr_code','code_128','code_39','ean_13','ean_8','upc_a','upc_e','itf','data_matrix','pdf417']});
      const canvas=document.createElement('canvas');
      const ctx=canvas.getContext('2d');
      scanLoop=setInterval(async()=>{
        if(!vid.readyState||vid.readyState<2) return;
        canvas.width=vid.videoWidth; canvas.height=vid.videoHeight;
        ctx.drawImage(vid,0,0);
        try{ const c=await bd.detect(canvas); if(c.length) onScanResult(c[0].rawValue); }catch(_){}
      },300);
    } else {
      if(!zxingReady){
        document.getElementById("scan-code").textContent='Loading scanner…';
        await new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
        zxingReady=true;
        document.getElementById("scan-code").textContent='';
      }
      stream.getTracks().forEach(t=>t.stop()); scanStream=null;
      codeReader=new ZXing.BrowserMultiFormatReader();
      const devices=await codeReader.listVideoInputDevices();
      const devId=devices.length>1?devices[devices.length-1].deviceId:devices[0]?.deviceId;
      await codeReader.decodeFromVideoDevice(devId,'scan-vid',r=>{ if(r) onScanResult(r.getText()); });
    }
  }catch(e){ toast("Camera: "+e.message); closeScanner(); }
}

function onScanResult(code){
  document.getElementById("scan-code").textContent='✓ '+code;
  setTimeout(()=>{
    closeScanner();
    document.getElementById("search").value=code;
    query=code; applyAll(); toast("📷 "+code);
  },400);
}
function closeScanner(){
  document.getElementById("scan-ov").classList.remove("show");
  document.getElementById("scan-btn").classList.remove("on");
  if(scanLoop){ clearInterval(scanLoop); scanLoop=null; }
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream=null; }
  if(codeReader){ try{codeReader.reset();}catch(_){} codeReader=null; }
  const v=document.getElementById("scan-vid");
  if(v.srcObject){ v.srcObject.getTracks().forEach(t=>t.stop()); v.srcObject=null; }
}
