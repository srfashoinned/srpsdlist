<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR Fashion Stock</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#eef1f6;
}

/* HEADER */
.header {
  position:sticky;
  top:0;
  background:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  z-index:10;
}

/* SEARCH */
.search-box {
  position:relative;
  padding:10px;
}

.search-box input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

/* SUGGESTIONS */
.suggestions {
  position:absolute;
  top:55px;
  left:10px;
  right:10px;
  background:white;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  max-height:200px;
  overflow:auto;
  display:none;
}

.suggestions div {
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.suggestions div:hover {
  background:#f0f0f0;
}

/* CARD */
.container { padding:10px; }

.card {
  background:white;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.name {
  font-weight:bold;
  font-size:16px;
}

.alias {
  font-size:12px;
  color:gray;
}

/* BADGES */
.badge {
  padding:5px 9px;
  border-radius:8px;
  font-size:13px;
  margin:4px 4px 0 0;
  display:inline-block;
}

.mrp { background:#e0e0e0; }
.sale { background:#c8e6c9; color:#1b5e20; }
.wholesale { background:#bbdefb; color:#0d47a1; }
.stock { background:#ffccbc; color:#bf360c; }
.purchase { background:#e1bee7; color:#4a148c; }

mark { background:yellow; }

/* BUTTON */
button {
  padding:8px 14px;
  border:none;
  background:linear-gradient(45deg,#000,#444);
  color:white;
  border-radius:6px;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:300px;
}
</style>

</head>

<body>

<div class="header">
  <h3>SR Fashion</h3>
  <button onclick="openAdmin()">Admin</button>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search name or alias..." oninput="handleSearch()">
  <div class="suggestions" id="suggestions"></div>
</div>

<div class="container" id="list"></div>

<!-- ADMIN -->

<div class="modal" id="adminModal">
  <div class="modal-content">
    <h3>Admin Login</h3>
    <input type="password" id="password" inputmode="numeric">
    <button onclick="checkPassword()">Login</button>
  </div>
</div>

<script>
let allData = [];
let isAdmin = false;

/* LOAD DATA */
async function loadData(){
  const res = await fetch('https://raw.githubusercontent.com/srfashoinned/srpsdlist/main/items.json');
  allData = await res.json();
  render(allData);
}

/* ADMIN */
function openAdmin(){
  document.getElementById("adminModal").style.display="flex";
}

function checkPassword(){
  if(document.getElementById("password").value==="7865"){
    isAdmin=true;
    document.getElementById("adminModal").style.display="none";
    render(allData);
  } else alert("Wrong password");
}

/* 🔥 SMART SCORE SEARCH */
function getScore(text, query){
  text = text.toLowerCase();
  query = query.toLowerCase();

  if(text === query) return 100;
  if(text.startsWith(query)) return 80;
  if(text.includes(query)) return 60;

  // loose match
  let score = 0;
  let i = 0;
  for(let c of text){
    if(c === query[i]){
      score += 5;
      i++;
    }
    if(i === query.length) break;
  }
  return score;
}

/* SEARCH */
function handleSearch(){
  const q = document.getElementById("search").value.trim().toLowerCase();
  const suggestionsBox = document.getElementById("suggestions");

  if(!q){
    suggestionsBox.style.display="none";
    render(allData);
    return;
  }

  let results = allData.map(item=>{
    const score = Math.max(
      getScore(item.name, q),
      getScore(item.alias, q)
    );
    return { ...item, score };
  });

  results = results.filter(i => i.score > 0);
  results.sort((a,b)=> b.score - a.score);

  render(results, q);

  /* suggestions */
  suggestionsBox.innerHTML="";
  results.slice(0,5).forEach(item=>{
    const div = document.createElement("div");
    div.innerText = item.name;
    div.onclick = ()=>{
      document.getElementById("search").value = item.name;
      suggestionsBox.style.display="none";
      render([item], q);
    };
    suggestionsBox.appendChild(div);
  });

  suggestionsBox.style.display = "block";
}

/* HIGHLIGHT */
function highlight(text, q){
  if(!q) return text;
  return text.replace(new RegExp(q,'gi'), m => `<mark>${m}</mark>`);
}

/* RENDER */
function render(data, q=""){
  const list = document.getElementById("list");
  list.innerHTML="";

  if(data.length===0){
    list.innerHTML="<p>No items found</p>";
    return;
  }

  data.forEach(item=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="name">${highlight(item.name, q)}</div>
      <div class="alias">Alias: ${highlight(item.alias, q)}</div>

      <div>
        <span class="badge mrp">MRP: ${item.mrp}</span>
        <span class="badge sale">Sale: ${item.sale}</span>
        <span class="badge wholesale">Wholesale: ${item.wholesale}</span>
        <span class="badge stock">Stock: ${item.stock}</span>
        ${isAdmin ? `<span class="badge purchase">Purchase: ${item.purchase}</span>` : ""}
      </div>
    `;

    list.appendChild(div);
  });
}

/* AUTO REFRESH */
setInterval(loadData, 30000);

loadData();
</script>

</body>
</html>
