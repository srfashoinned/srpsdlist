<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR Fashion Stock</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#111;
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#1a1a1a;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.admin-btn{background:gold;color:black}

.search{
  padding:10px;
}

input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  outline:none;
  font-size:16px;
}

.card{
  background:#1c1c1c;
  margin:10px;
  padding:12px;
  border-radius:10px;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:6px;
  margin:3px;
  font-size:14px;
}

.mrp{background:#444}
.sale{background:#2ecc71}
.wholesale{background:#3498db}
.stock{background:#e67e22}
.purchase{background:#9b59b6}

</style>

</head>

<body>

<div class="header">
  <h2>SR Fashion</h2>
  <button class="admin-btn" onclick="adminLogin()">Admin</button>
</div>

<div class="search">
  <input id="search" placeholder="Search name or alias...">
</div>

<div id="list">Loading...</div>

<script>

let data = [];
let isAdmin = false;

// FETCH DATA
async function loadData(){
  try{
    const res = await fetch("https://raw.githubusercontent.com/srfashoinned/srpsdlist/main/items.json?v="+Date.now());
    data = await res.json();
    render(data);
  }catch{
    document.getElementById("list").innerHTML="Error loading data";
  }
}

// SEARCH (SMART)
function match(text, q){
  text = (text||"").toLowerCase();
  q = q.toLowerCase();

  if(text.includes(q)) return true;

  let i=0;
  for(let c of text){
    if(c===q[i]) i++;
    if(i===q.length) return true;
  }
  return false;
}

function search(q){
  if(!q) return data;

  return data.filter(i =>
    match(i.name,q) ||
    match(i.alias,q)
  );
}

// RENDER
function render(list){
  const el = document.getElementById("list");

  if(list.length===0){
    el.innerHTML="<p style='padding:20px'>No results</p>";
    return;
  }

  el.innerHTML = list.map(item=>`
    <div class="card">
      <b>${item.name}</b><br>
      <small>Alias: ${item.alias}</small><br><br>

      <span class="badge mrp">MRP: ${item.mrp}</span>
      <span class="badge sale">Sale: ${item.sale}</span>
      <span class="badge wholesale">Wholesale: ${item.wholesale}</span>
      <span class="badge stock">Stock: ${item.stock}</span>

      ${isAdmin ? `<br><span class="badge purchase">Purchase: ${item.purchase}</span>` : ""}
    </div>
  `).join("");
}

// SEARCH EVENT
document.getElementById("search").addEventListener("input", e=>{
  render(search(e.target.value));
});

// ADMIN LOGIN
function adminLogin(){
  const pass = prompt("Enter password");

  if(pass==="7865"){
    isAdmin=true;
    render(data);
    alert("Admin unlocked");
  }else{
    alert("Wrong password");
  }
}

// INIT
loadData();

</script>

</body>
</html>
