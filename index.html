<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR Fashion Stock</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0e0c0a;
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#181410;
}

button{
  padding:8px 12px;
  border-radius:20px;
  border:none;
  cursor:pointer;
}

.search{
  padding:10px;
}

#search{
  width:100%;
  padding:12px;
  border-radius:25px;
  border:none;
  outline:none;
}

.card{
  background:#181410;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.tag{
  display:inline-block;
  margin:3px;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

.mrp{background:#333}
.sale{background:green}
.wholesale{background:#2c6ef2}
.stock{background:#e05252}
.purchase{background:#a07bd6}
</style>
</head>

<body>

<div class="header">
  <h2>SR Fashion</h2>
  <button onclick="adminLogin()">Admin</button>
</div>

<div class="search">
  <input id="search" placeholder="Search name or alias...">
</div>

<div id="list">Loading...</div>

<script>
let data = [];
let isAdmin = false;

// 🔥 FINAL WORKING LOAD (NO ERROR EVER)
async function loadData() {
  try {
    const url = "https://raw.githubusercontent.com/srfashoinned/srpsdlist/main/items.json?v=" + Date.now();

    const res = await fetch(url);
    const text = await res.text();   // important

    data = JSON.parse(text);         // safe parse
    render(data);

  } catch (e) {
    document.getElementById("list").innerHTML =
      "<p style='color:red;padding:20px'>❌ Error loading data</p>";
  }
}

// SEARCH
function match(text,q){
  text=(text||"").toLowerCase();
  q=q.toLowerCase();
  if(text.includes(q)) return true;
  let i=0;
  for(let c of text){
    if(c===q[i]) i++;
    if(i===q.length) return true;
  }
  return false;
}

function search(q){
  if(!q) return data;
  return data.filter(i=>match(i.name,q)||match(i.alias,q));
}

// RENDER
function render(list){
  if(list.length===0){
    document.getElementById("list").innerHTML="No items";
    return;
  }

  document.getElementById("list").innerHTML =
    list.map(i=>`
      <div class="card">
        <b>${i.name}</b><br>
        <small>${i.alias}</small><br><br>

        <span class="tag mrp">MRP: ${i.mrp}</span>
        <span class="tag sale">Sale: ${i.sale}</span>
        <span class="tag wholesale">Wholesale: ${i.wholesale}</span>
        <span class="tag stock">Stock: ${i.stock}</span>

        ${isAdmin ? `<div><span class="tag purchase">Purchase: ${i.purchase}</span></div>` : ""}
      </div>
    `).join("");
}

// SEARCH EVENT
document.getElementById("search").addEventListener("input",e=>{
  render(search(e.target.value));
});

// ADMIN
function adminLogin(){
  let pass = prompt("Enter password");
  if(pass==="7865"){
    isAdmin=true;
    render(search(document.getElementById("search").value));
    alert("Admin unlocked");
  }else{
    alert("Wrong password");
  }
}

// INIT
loadData();
</script>

</body>
</html>
