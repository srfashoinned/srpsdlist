  <div id="hdr-right">

    <!-- ✅ NEW REFRESH BUTTON -->

<!-- ================= STOCK FILTER UI (NEW) ================= -->
<!-- ADD BELOW PRICE FILTER -->
<div id="stock-filter" style="display:flex;gap:6px;margin-top:4px;">
  <div class="chip on" data-stock="all">All</div>
  <div class="chip" data-stock="out">Out</div>
  <div class="chip" data-stock="low">Low</div>
</div>

<script>

/* ================= STATE (UPDATED) ================= */
let stockFilter = 'all';


/* ================= REFRESH FUNCTION ================= */
function refreshData(){
  toast("🔄 Refreshing...");
  loadData();
}


/* ================= STOCK FILTER CLICK ================= */
document.getElementById("stock-filter").addEventListener("click",function(e){
  const c = e.target.closest(".chip[data-stock]");
  if(!c) return;

  document.querySelectorAll("#stock-filter .chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on");

  stockFilter = c.dataset.stock;
  applyAll();
});


/* ================= APPLY FILTER (UPDATED LOGIC ONLY) ================= */
function applyAll(){
  const q = query.trim().toLowerCase();
  const hasFilter = q || pMin!==null || pMax!==null || activeGroup || activeSort!=='df' || stockFilter!=='all';
  if(!hasFilter){ showWelcome(); return; }

  expanded.clear();
  let out = [];

  for(let i=0;i<raw.length;i++){
    const it = raw[i];

    if(activeGroup && it.group!==activeGroup) continue;
    if(pMin!==null && pn(it.sale)<pMin) continue;
    if(pMax!==null && pn(it.sale)>pMax) continue;

    // ✅ STOCK FILTER LOGIC
    const stock = parseFloat(it.stock) || 0;

    if(stockFilter === 'out' && stock > 0) continue;
    if(stockFilter === 'low' && stock > 5) continue;

    if(q){
      const n=(it.name||'').toLowerCase();
      const a=(it.alias||'').toLowerCase();
      const b=(it.barcode||'').toLowerCase();
      const g=(it.group||'').toLowerCase();
      if(!n.includes(q)&&!a.includes(q)&&!b.includes(q)&&!g.includes(q)) continue;
    }

    out.push(i);
  }

  if(activeSort==='grp')  out.sort((a,b)=>((raw[a].group||'').localeCompare(raw[b].group||'')) || (raw[a].name||'').localeCompare(raw[b].name||''));
  else if(activeSort==='na') out.sort((a,b)=>(raw[a].name||'').localeCompare(raw[b].name||''));
  else if(activeSort==='sa') out.sort((a,b)=>pn(raw[a].sale)-pn(raw[b].sale));
  else if(activeSort==='sd') out.sort((a,b)=>pn(raw[b].sale)-pn(raw[a].sale));

  pool = out;

  rebuildOffsets();

  const sortLabel = activeSort==='grp'?' · sorted by group':activeSort==='na'?' · A–Z':activeSort==='sa'?' · price ↑':activeSort==='sd'?' · price ↓':'';

  document.getElementById("status").textContent =
    (pool.length===raw.length
      ? raw.length.toLocaleString()+" items"
      : pool.length.toLocaleString()+" of "+raw.length.toLocaleString()+" items")
    + sortLabel;

  scrollEl.scrollTop = 0;
  vsRender(true);
}

</script>
