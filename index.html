<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>SR PSD • Lightning Fast</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080809; --surface: #101012; --card: #141418;
  --border: rgba(255,255,255,0.07); --gold: #F5C542;
  --green: #22c55e; --blue: #3b82f6; --purple: #a855f7; --red: #ef4444;
  --text: #e8e8f0; --muted: #666680;
  --font-head: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
body { background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,8,9,0.98); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  height: 50px; padding: 0 12px;
  display: flex; align-items: center; gap: 8px;
}
.logo { font-family: var(--font-head); font-size: 24px; letter-spacing: 2px; color: var(--gold); }
.header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.count-badge { font-family: var(--font-mono); font-size: 10px; background: var(--surface); border: 1px solid var(--border); padding: 3px 8px; border-radius: 20px; }
.admin-btn { font-size: 12px; font-weight: 600; background: transparent; color: var(--gold); border: 1.5px solid var(--gold); padding: 4px 12px; border-radius: 8px; cursor: pointer; transition: 0.1s; }
.admin-btn.active { background: var(--gold); color: #000; }
.search-wrap { padding: 8px 12px; }
.search-inner { position: relative; display: flex; gap: 6px; }
#search {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 35px 10px 35px;
  font-size: 14px; color: var(--text); outline: none;
}
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.5; font-size: 14px; }
.clear-btn {
  position: absolute; right: 55px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px;
  display: none; width: 20px; height: 20px;
}
.scan-btn {
  width: 42px; height: 42px; flex-shrink: 0; border-radius: 10px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.scan-btn:active { background: rgba(245,197,66,0.1); }
.chip-row { padding: 0 12px 6px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  white-space: nowrap; font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted); cursor: pointer;
}
.chip.active { background: var(--gold); border-color: var(--gold); color: #000; }
.price-bar { padding: 0 12px 8px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.price-input { width: 65px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; font-size: 11px; font-family: var(--font-mono); color: var(--text); }
.price-btn { padding: 4px 8px; border-radius: 6px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; }
.price-go { background: var(--gold); color: #000; }
.price-clr { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
.result-line { padding: 0 12px 6px; font-size: 11px; color: var(--muted); }
#list { padding: 0 12px 80px; display: flex; flex-direction: column; gap: 8px; }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px; cursor: pointer;
  transition: 0.1s;
}
.card:active { transform: scale(0.99); }
.card-top { display: flex; justify-content: space-between; align-items: center; }
.c-name { font-family: var(--font-head); font-size: 18px; line-height: 1.2; }
.c-alias { font-size: 10px; color: var(--muted); font-family: var(--font-mono); margin-top: 2px; }
.expand-icon { font-size: 14px; color: var(--muted); transition: 0.1s; }
.card.expanded .expand-icon { transform: rotate(180deg); color: var(--gold); }
.prices { margin-top: 8px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.pb { border-radius: 8px; padding: 6px 8px; display: flex; flex-direction: column; }
.pb.mrp { background: rgba(245,197,66,0.12); border-left: 2px solid var(--gold); }
.pb.sale { background: rgba(34,197,94,0.12); border-left: 2px solid var(--green); }
.pb.whole { background: rgba(59,130,246,0.12); border-left: 2px solid var(--blue); }
.pb.stock { background: rgba(239,68,68,0.1); border-left: 2px solid var(--red); }
.pl { font-size: 9px; font-weight: 600; text-transform: uppercase; opacity: 0.7; }
.pv { font-family: var(--font-mono); font-size: 14px; font-weight: 600; }
.card-details { max-height: 0; overflow: hidden; transition: max-height 0.2s ease; }
.card.expanded .card-details { max-height: 200px; }
.cdi { padding-top: 8px; border-top: 1px solid var(--border); margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
.dr { display: flex; justify-content: space-between; font-size: 11px; }
.dr span:first-child { color: var(--muted); }
.act-row { display: flex; gap: 6px; margin-top: 6px; }
.ab { flex: 1; padding: 6px; border-radius: 6px; font-size: 10px; font-weight: 600; border: none; cursor: pointer; }
.ab.copy { background: rgba(59,130,246,0.15); color: var(--blue); }
.ab.share { background: rgba(34,197,94,0.12); color: var(--green); }
.ab.edit { background: rgba(245,197,66,0.15); color: var(--gold); }
.empty, .loading { text-align: center; padding: 40px 20px; color: var(--muted); }
.spinner { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); border-top-color: var(--gold); animation: spin 0.6s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.card { animation: fadeIn 0.12s ease; }
mark { background: rgba(245,197,66,0.4); color: var(--gold); border-radius: 2px; padding: 0 1px; }
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--surface); border: 1px solid var(--border); border-radius: 30px;
  padding: 6px 16px; font-size: 12px; z-index: 300; transition: 0.15s; opacity: 0;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.fab {
  position: fixed; bottom: 20px; right: 16px; width: 44px; height: 44px;
  background: var(--gold); border-radius: 50%; border: none; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(245,197,66,0.3); z-index: 150;
}
.scanner-overlay {
  position: fixed; inset: 0; z-index: 400; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: 0.15s;
}
.scanner-overlay.show { opacity: 1; pointer-events: all; }
#scanner-video { width: 100%; max-width: 100%; height: 100%; object-fit: cover; }
.scanner-ui { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.scan-frame {
  width: 280px; height: 200px; border: 2px solid var(--gold); border-radius: 16px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.7); position: relative;
}
.scan-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: var(--gold); box-shadow: 0 0 8px var(--gold);
  animation: scanMove 1.5s ease-in-out infinite; top: 0;
}
@keyframes scanMove { 0% { top: 5px; } 50% { top: calc(100% - 5px); } 100% { top: 5px; } }
.scan-hint { margin-top: 20px; color: rgba(255,255,255,0.8); font-size: 13px; background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 30px; }
.scan-close-btn {
  pointer-events: all; margin-top: 20px; background: rgba(255,255,255,0.2);
  border: none; color: #fff; padding: 8px 24px; border-radius: 30px;
  font-size: 14px; cursor: pointer; font-weight: 600;
}
.mbg {
  position: fixed; inset: 0; z-index: 350; background: rgba(0,0,0,0.9);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: 0.1s;
}
.mbg.show { opacity: 1; pointer-events: all; }
.mbox { background: var(--card); border-radius: 20px; padding: 20px; width: 280px; text-align: center; }
.mtitle { font-family: var(--font-head); font-size: 26px; color: var(--gold); }
#admin-pw { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-size: 20px; font-family: var(--font-mono); text-align: center; letter-spacing: 4px; margin: 12px 0; outline: none; color: var(--text); }
.mbtns { display: flex; gap: 8px; margin-top: 12px; }
.ml { flex: 2; padding: 8px; background: var(--gold); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
.mc { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; color: var(--muted); }
.embg {
  position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.9);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: 0.1s;
}
.embg.show { opacity: 1; pointer-events: all; }
.embox { background: var(--card); border-radius: 20px; padding: 20px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
.etitle { font-family: var(--font-head); font-size: 22px; color: var(--gold); margin-bottom: 12px; }
.fg { display: flex; flex-direction: column; gap: 8px; }
.flbl { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
.finput { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: var(--font-mono); color: var(--text); outline: none; }
.ebtns { display: flex; gap: 8px; margin-top: 16px; }
.bsave { flex: 2; padding: 10px; background: var(--gold); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
.bcancel { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">SR PSD</div>
  <div class="header-right">
    <div class="count-badge" id="count">—</div>
    <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">⚡ Admin</button>
  </div>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search name, barcode..." autocomplete="off">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
    <button class="scan-btn" id="scanBtn" onclick="startScanner()">📷</button>
  </div>
</div>

<div class="chip-row" id="sortRow">
  <div class="chip active" data-sort="default">All</div>
  <div class="chip" data-sort="name">A-Z</div>
  <div class="chip" data-sort="mrp">MRP ↓</div>
  <div class="chip" data-sort="sale">Sale ↓</div>
</div>

<div class="price-bar">
  <input type="number" class="price-input" id="minPrice" placeholder="Min ₹">
  <span style="font-size:11px">–</span>
  <input type="number" class="price-input" id="maxPrice" placeholder="Max ₹">
  <button class="price-btn price-go" onclick="filterPrice()">Go</button>
  <button class="price-btn price-clr" onclick="clearPrice()">Clear</button>
</div>

<div class="result-line" id="resultInfo"></div>
<div id="list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
<button class="fab" id="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none">↑</button>

<div class="scanner-overlay" id="scannerOverlay">
  <video id="scannerVideo" autoplay muted playsinline></video>
  <div class="scanner-ui">
    <div class="scan-frame"><div class="scan-line"></div></div>
    <div class="scan-hint">📸 Position barcode in frame</div>
    <button class="scan-close-btn" onclick="stopScanner()">Close</button>
  </div>
</div>

<div class="mbg" id="adminModal"><div class="mbox"><div class="mtitle">ADMIN</div><input type="password" id="adminPass" maxlength="4" placeholder="****" autocomplete="off"><div class="mbtns"><button class="mc" onclick="closeAdmin()">Cancel</button><button class="ml" onclick="loginAdmin()">Unlock</button></div></div></div>
<div class="embg" id="editModal"><div class="embox"><div class="etitle">✏️ Edit Item</div><div id="editFields"></div><div class="ebtns"><button class="bcancel" onclick="closeEdit()">Cancel</button><button class="bsave" onclick="saveEdit()">Save</button></div></div></div>
<div class="toast" id="toast"></div>

<script>
// ========== ULTRA FAST CORE ==========
let items = [];           // original data
let filtered = [];        // current filtered list
let isAdmin = false;
let sortType = 'default';
let minSale = null, maxSale = null;
let searchText = '';
let editIdx = -1;
let scanner = null;
let scanActive = false;

// Helper: parse number
const toNum = v => parseFloat(String(v).replace(/[^0-9.-]/g, '')) || 0;

// Load data once
async function load() {
  try {
    const res = await fetch(`items.json?t=${Date.now()}`);
    if (!res.ok) throw new Error();
    items = await res.json();
    // Normalize numbers
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      it.mrp = toNum(it.mrp);
      it.sale = toNum(it.sale);
      it.wholesale = toNum(it.wholesale);
      it.purchase = toNum(it.purchase);
      it.stock = it.stock ?? 0;
    }
    filterAndRender();
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="empty">⚠️ Failed to load items.json<br><span style="font-size:11px">Make sure file exists in same folder</span></div>';
  }
}

// Main filter + sort (extremely fast, no DOM thrashing)
function filterAndRender() {
  const q = searchText.trim().toLowerCase();
  let result = [];
  
  // Single pass filter
  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    if (minSale !== null && it.sale < minSale) continue;
    if (maxSale !== null && it.sale > maxSale) continue;
    if (q) {
      const nameMatch = it.name?.toLowerCase().includes(q);
      const aliasMatch = it.alias?.toLowerCase().includes(q);
      const barcodeMatch = it.barcode?.toLowerCase().includes(q);
      if (!nameMatch && !aliasMatch && !barcodeMatch) continue;
    }
    result.push(it);
  }
  
  // Sort (direct)
  if (sortType === 'name') {
    result.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
  } else if (sortType === 'mrp') {
    result.sort((a,b) => b.mrp - a.mrp);
  } else if (sortType === 'sale') {
    result.sort((a,b) => b.sale - a.sale);
  } else {
    result.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
  }
  
  filtered = result;
  renderList();
  updateUI();
}

// Render only whats needed (virtual style)
function renderList() {
  const container = document.getElementById('list');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty">🔍 No items found</div>';
    return;
  }
  
  let html = [];
  const q = searchText.trim().toLowerCase();
  
  for (let idx = 0; idx < filtered.length; idx++) {
    const it = filtered[idx];
    const globalIdx = items.indexOf(it);
    const nameHigh = q ? highlight(it.name || '', q) : (it.name || '-');
    const aliasHigh = q ? highlight(it.alias || '', q) : (it.alias || '-');
    
    const purchBlock = isAdmin ? `<div class="pb stock" style="border-left-color:var(--purple)"><div class="pl">PURCHASE</div><div class="pv">${formatPrice(it.purchase)}</div></div>` : '';
    const adminDetails = isAdmin ? `<div class="dr"><span>Purchase</span><span>${formatPrice(it.purchase)}</span></div><div class="dr"><span>Margin</span><span>${Math.round(((it.sale - it.purchase)/it.sale)*100) || 0}%</span></div>` : '';
    const editBtn = isAdmin ? `<button class="ab edit" onclick="event.stopPropagation();openEdit(${globalIdx})">✏️</button>` : '';
    let extra = '';
    if (it.barcode) extra += `<div class="dr"><span>Barcode</span><span>${it.barcode}</span></div>`;
    if (it.brand) extra += `<div class="dr"><span>Brand</span><span>${it.brand}</span></div>`;
    
    html.push(`<div class="card" data-idx="${globalIdx}" onclick="toggleCard(this, ${globalIdx})">
      <div class="card-top">
        <div><div class="c-name">${nameHigh}</div><div class="c-alias"># ${aliasHigh}</div></div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="prices">
        <div class="pb mrp"><div class="pl">MRP</div><div class="pv">${formatPrice(it.mrp)}</div></div>
        <div class="pb sale"><div class="pl">SALE</div><div class="pv">${formatPrice(it.sale)}</div></div>
        <div class="pb whole"><div class="pl">WHOLESALE</div><div class="pv">${formatPrice(it.wholesale)}</div></div>
        <div class="pb stock"><div class="pl">STOCK</div><div class="pv">${it.stock !== undefined ? it.stock : '-'}</div></div>
        ${purchBlock}
      </div>
      <div class="card-details"><div class="cdi">
        <div class="dr"><span>Name</span><span>${it.name || '-'}</span></div>
        <div class="dr"><span>Alias</span><span>${it.alias || '-'}</span></div>
        ${extra}${adminDetails}
        <div class="act-row">
          <button class="ab copy" onclick="event.stopPropagation();copyItem(${globalIdx})">📋 Copy</button>
          <button class="ab share" onclick="event.stopPropagation();shareItem(${globalIdx})">📤 Share</button>
          ${editBtn}
        </div>
      </div></div>
    </div>`);
  }
  container.innerHTML = html.join('');
}

function highlight(text, q) {
  if (!q || !text) return text;
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return text;
  return text.substring(0, idx) + '<mark>' + text.substring(idx, idx + q.length) + '</mark>' + text.substring(idx + q.length);
}

function formatPrice(v) {
  if (v === undefined || v === null || v === '') return '-';
  return '₹' + Number(v).toLocaleString('en-IN');
}

function updateUI() {
  document.getElementById('count').textContent = `${items.length} items`;
  const showing = filtered.length === items.length ? `All ${items.length}` : `${filtered.length} of ${items.length}`;
  document.getElementById('resultInfo').textContent = showing;
}

function toggleCard(el, idx) {
  el.classList.toggle('expanded');
}

// Search with instant feedback
let searchTimeout;
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', (e) => {
  searchText = e.target.value;
  document.getElementById('clearBtn').style.display = searchText ? 'flex' : 'none';
  if (searchTimeout) clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => filterAndRender(), 15);
});

function clearSearch() {
  searchInput.value = '';
  searchText = '';
  document.getElementById('clearBtn').style.display = 'none';
  filterAndRender();
  searchInput.focus();
}

// Sort chips
document.getElementById('sortRow').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('#sortRow .chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  sortType = chip.dataset.sort;
  filterAndRender();
});

// Price filter
function filterPrice() {
  const min = document.getElementById('minPrice').value;
  const max = document.getElementById('maxPrice').value;
  minSale = min !== '' ? parseFloat(min) : null;
  maxSale = max !== '' ? parseFloat(max) : null;
  filterAndRender();
  showToast(`💰 ${minSale || '0'} - ${maxSale || '∞'}`);
}

function clearPrice() {
  document.getElementById('minPrice').value = '';
  document.getElementById('maxPrice').value = '';
  minSale = null;
  maxSale = null;
  filterAndRender();
  showToast('Price filter cleared');
}

// Copy & Share
function copyItem(idx) {
  const it = items[idx];
  const text = `${it.name} (${it.alias})\nMRP: ${formatPrice(it.mrp)} | Sale: ${formatPrice(it.sale)} | Stock: ${it.stock || '-'}`;
  navigator.clipboard.writeText(text);
  showToast('📋 Copied');
}

function shareItem(idx) {
  const it = items[idx];
  const text = `${it.name} - ${formatPrice(it.sale)}`;
  if (navigator.share) navigator.share({ title: it.name, text });
  else navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
}

// ========== POWERFUL SCANNER ==========
async function startScanner() {
  if (scanActive) return;
  const overlay = document.getElementById('scannerOverlay');
  overlay.classList.add('show');
  scanActive = true;
  const video = document.getElementById('scannerVideo');
  
  try {
    if (typeof ZXing === 'undefined') throw new Error('Library not loaded');
    scanner = new ZXing.BrowserMultiFormatReader();
    const devices = await scanner.listVideoInputDevices();
    if (!devices.length) throw new Error('No camera');
    
    // Select back camera (prefer environment)
    const cam = devices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('environment')) || devices[0];
    
    await scanner.decodeFromVideoDevice(cam.deviceId, video, (result, err) => {
      if (result) {
        const code = result.getText();
        stopScanner();
        searchInput.value = code;
        searchText = code;
        document.getElementById('clearBtn').style.display = 'flex';
        filterAndRender();
        showToast(`✅ Scanned: ${code}`);
      }
    });
  } catch (err) {
    console.error(err);
    showToast('Camera error: ' + err.message);
    stopScanner();
  }
}

function stopScanner() {
  scanActive = false;
  document.getElementById('scannerOverlay').classList.remove('show');
  if (scanner) {
    try { scanner.reset(); } catch(e) {}
    scanner = null;
  }
  const video = document.getElementById('scannerVideo');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
}

// ========== ADMIN ==========
function toggleAdmin() {
  if (isAdmin) logoutAdmin();
  else openAdmin();
}

function openAdmin() {
  document.getElementById('adminModal').classList.add('show');
  document.getElementById('adminPass').focus();
}

function closeAdmin() {
  document.getElementById('adminModal').classList.remove('show');
  document.getElementById('adminPass').value = '';
}

function loginAdmin() {
  const pass = document.getElementById('adminPass').value;
  if (pass === '7865') {
    isAdmin = true;
    closeAdmin();
    document.getElementById('adminBtn').textContent = '🔓 Logout';
    document.getElementById('adminBtn').classList.add('active');
    filterAndRender();
    showToast('Admin mode ON');
  } else {
    showToast('Wrong PIN');
    document.getElementById('adminPass').value = '';
    document.getElementById('adminPass').focus();
  }
}

function logoutAdmin() {
  isAdmin = false;
  document.getElementById('adminBtn').textContent = '⚡ Admin';
  document.getElementById('adminBtn').classList.remove('active');
  filterAndRender();
  showToast('Logged out');
}

// Edit
function openEdit(idx) {
  if (!isAdmin) return;
  editIdx = idx;
  const it = items[idx];
  const fields = ['name', 'alias', 'mrp', 'sale', 'wholesale', 'stock', 'purchase', 'brand', 'group', 'barcode'];
  const labels = { name:'Name', alias:'Alias', mrp:'MRP (₹)', sale:'Sale (₹)', wholesale:'Wholesale (₹)', stock:'Stock', purchase:'Purchase (₹)', brand:'Brand', group:'Group', barcode:'Barcode' };
  let html = '';
  for (let f of fields) {
    html += `<div><div class="flbl">${labels[f]}</div><input class="finput" id="edit_${f}" value="${it[f] !== undefined ? it[f] : ''}" placeholder="${labels[f]}"></div>`;
  }
  document.getElementById('editFields').innerHTML = html;
  document.getElementById('editModal').classList.add('show');
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('show');
  editIdx = -1;
}

function saveEdit() {
  if (editIdx === -1) return;
  const it = items[editIdx];
  const fields = ['name', 'alias', 'mrp', 'sale', 'wholesale', 'stock', 'purchase', 'brand', 'group', 'barcode'];
  for (let f of fields) {
    const el = document.getElementById(`edit_${f}`);
    if (el) it[f] = el.value;
  }
  it.mrp = toNum(it.mrp);
  it.sale = toNum(it.sale);
  it.wholesale = toNum(it.wholesale);
  it.purchase = toNum(it.purchase);
  closeEdit();
  filterAndRender();
  showToast('✅ Updated');
}

// Toast
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// Scroll to top
window.addEventListener('scroll', () => {
  document.getElementById('fab').style.display = window.scrollY > 200 ? 'flex' : 'none';
});

// Close modals on escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    stopScanner();
    closeAdmin();
    closeEdit();
  }
});

// Click outside close
document.getElementById('adminModal').addEventListener('click', (e) => {
  if (e.target.classList.contains('mbg')) closeAdmin();
});
document.getElementById('editModal').addEventListener('click', (e) => {
  if (e.target.classList.contains('embg')) closeEdit();
});

// Initialize
load();
</script>
