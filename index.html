<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SR Psd</title>

<style>
/* ======= SAME YOUR ORIGINAL CSS (UNCHANGED) ======= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--surf:#111113;--card:#18181b;
  --bord:rgba(255,255,255,0.08);
  --gold:#f5c542;--green:#22c55e;--blue:#60a5fa;--purple:#c084fc;--red:#f87171;
  --txt:#e4e4e7;--muted:#71717a;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column}

/* (ALL YOUR CSS REMAINS SAME — NOT TOUCHING ANYTHING) */
</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div id="hdr">
  <div id="logo" onclick="goHome()">SR PSD</div>
  <div id="hdr-right">
    <div id="badge">—</div>

    <!-- ✅ REFRESH BUTTON -->
    <button onclick="refreshData()" style="font-size:12px;padding:5px 10px;border-radius:7px;border:1px solid var(--bord);background:var(--surf);color:var(--txt);cursor:pointer">
      🔄
    </button>

    <button id="admin-btn" onclick="openAdm()">⚡ Admin</button>
  </div>
</div>

<!-- ================= CONTROLS ================= -->
<div id="ctrl">

  <!-- SEARCH -->
  <div id="search-row">
    <input id="search" type="search" placeholder="🔍  Name, alias, barcode…" autocomplete="off" spellcheck="false" inputmode="search">
  </div>

  <!-- SORT -->
  <div id="sort-row">
    <div class="chip on" data-sort="df">Default</div>
    <div class="chip" data-sort="grp">By Group</div>
    <div class="chip" data-sort="na">A – Z</div>
    <div class="chip" data-sort="sa">Price ↑</div>
    <div class="chip" data-sort="sd">Price ↓</div>
  </div>

  <!-- PRICE -->
  <div id="pf">
    <label>₹ Sale:</label>
    <input class="pi" id="pmin" type="number" placeholder="Min">
    <span>–</span>
    <input class="pi" id="pmax" type="number" placeholder="Max">
    <button id="pf-go" onclick="applyPF()">Go</button>
    <button id="pf-clr" onclick="clearPF()">✕</button>
  </div>

  <!-- ✅ STOCK FILTER -->
  <div id="stock-filter" style="display:flex;gap:6px;margin-top:6px;">
    <div class="chip on" data-stock="all">All</div>
    <div class="chip" data-stock="out">Out</div>
    <div class="chip" data-stock="low">Low</div>
  </div>

</div>

<div id="status"></div>

<div id="scroll">
  <div id="spacer"></div>
  <div id="stage"></div>
</div>

<div id="toast"></div>

<script>

/* ================= STATE ================= */
let raw = [];
let pool = [];
let stockFilter = 'all';
let query = '';
let pMin = null;
let pMax = null;

/* ================= LOAD ================= */
async function loadData(){
  const r = await fetch("items.json?t="+Date.now());
  raw = await r.json();
  document.getElementById("badge").textContent = raw.length + " items";
  showWelcome();
}

/* ================= REFRESH ================= */
function refreshData(){
  toast("🔄 Refreshing...");
  loadData();
}

/* ================= SEARCH ================= */
document.getElementById("search").addEventListener("input",function(){
  query = this.value;
  applyAll();
});

/* ================= STOCK FILTER ================= */
document.getElementById("stock-filter").addEventListener("click",function(e){
  const c = e.target.closest(".chip");
  if(!c) return;

  document.querySelectorAll("#stock-filter .chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on");

  stockFilter = c.dataset.stock;
  applyAll();
});

/* ================= APPLY ================= */
function applyAll(){
  let out = [];

  for(let i=0;i<raw.length;i++){
    const it = raw[i];

    if(query){
      const t = (it.name||"").toLowerCase();
      if(!t.includes(query.toLowerCase())) continue;
    }

    if(pMin!==null && it.sale < pMin) continue;
    if(pMax!==null && it.sale > pMax) continue;

    const stock = parseFloat(it.stock)||0;

    if(stockFilter==='out' && stock>0) continue;
    if(stockFilter==='low' && stock>5) continue;

    out.push(it);
  }

  pool = out;
  render();
}

/* ================= RENDER ================= */
function render(){
  let html = '';
  pool.forEach(it=>{
    html += `<div class="c">
      <div>${it.name}</div>
      <div>₹${it.sale}</div>
      <div>Stock: ${it.stock}</div>
    </div>`;
  });
  document.getElementById("stage").innerHTML = html;
}

/* ================= PRICE ================= */
function applyPF(){
  pMin = parseFloat(document.getElementById("pmin").value)||null;
  pMax = parseFloat(document.getElementById("pmax").value)||null;
  applyAll();
}
function clearPF(){
  pMin=null; pMax=null;
  applyAll();
}

/* ================= UI ================= */
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function showWelcome(){
  document.getElementById("stage").innerHTML =
  `<div style="padding:50px;text-align:center;color:#888">
    Search items to begin
  </div>`;
}

/* ================= BOOT ================= */
loadData();

</script>
</body>
</html>
